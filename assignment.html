<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevConf 2026</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./styles/style.css" />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

  <body>
    <!-- Navbar Start -->

    <header>
      <nav class="container">
        <!-- Logo -->
        <div class="logo-parent">
          <i class="fa-solid fa-code"></i>
          <h2 class="logo">DEVCONF <span>2026</span></h2>
        </div>

        <!-- Menu -->
        <ul>
          <li><a href="#">Speakers</a></li>
          <li><a href="#">Schedule</a></li>
          <li><a href="#">Tracks</a></li>
          <li><a href="#">Venue</a></li>
          <li><a href="#">Blog</a></li>
        </ul>

        <!-- Button -->
        <button class="common-btn">Register Now</button>
      </nav>
    </header>

    <!-- Navbar End -->

    <!-- Hero Section Start -->

    <section class="hero-parent-root">

        <div class="hero-overlay">

            <div class="container hero-parent">

                <h1>
                    Code.
                    <em>Connect.</em>
                    Create
                </h1>

                <p>
                    Join 4,000+ engineers, founders, and builders at the premier
                    developer conference of 2026. Three days of cutting-edge talks,
                    hands-on workshops, and meaningful connections.
                </p>

                <button class="common-btn">
                    Register Now
                </button>

            </div>

        </div>

    </section>

    <!-- Hero Section End -->
